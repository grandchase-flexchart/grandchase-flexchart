<!DOCTYPE html>
<html>
    <head>
        <title>Grand Chase Unit Chart</title>
        <meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg">
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
		<script src="static/js/dom-to-image.js"></script>
    </head>
    <style>
    body {
        background: #111;
        color: white;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
    }
    #iconContainer {
        display: flex;
        flex-wrap: wrap;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        gap: 8px;
        width: 100%;
        max-width: 100vw;
        box-sizing: border-box;
        padding: 10px;
    }
    .hex {
        position: relative;
        background: #333;
        overflow: hidden;

        clip-path: polygon(
            50% 0%,
            100% 25%,
            100% 75%,
            50% 100%,
            0% 75%,
            0% 25%
        );
    }
    .hex.summary {
        pointer-events: none;
        background: white;
        opacity: 1;
        font-size: 32px;
        font-weight: bolder;
        color: black;
    }
    .counter {
        position: absolute;
        top: 15%;
        right: 20%;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-left: 6px;
        margin: 0;
        font-size: 16px;
        font-weight: bolder;
        line-height: 1.5;
        color: white;
        background: black;
        border: 1px solid rgba(255, 255, 255, 0.25);
        text-shadow: none;
        pointer-events: none;
        box-sizing: border-box;
    /* fixes optical digit shift */
    text-indent: 0;
    letter-spacing: 0;
    }
    .row {
        display: flex;
    }

    .row + .row {
        margin-top: -28px;
    }

    .row.even {
        margin-left: 68px;
    }
    .icon {
        width: 100%;
        height: 100%;
        object-fit: cover;

        clip-path: polygon(
            50% 0%,
            100% 25%,
            100% 75%,
            50% 100%,
            0% 75%,
            0% 25%
        );
        opacity: 0.3;
    }
    .icon.active {
        opacity: 1;
    }
    @media (max-width: 600px) {
        .icon {
            width: 96px;
            height: 96px;
        }
    }
    </style>

            };
            var state = {
              'elesis0':-1,
              'rufus0':-1,
              'mari0':-1,
              'metatron0':-1,
              'lass0':-1,
              'myrielle0':-1,
              'amy0':-1,
              'grandiel1':-1,
              'edel0':-1,
              'deia1':-1,
              'lime2':-1,
              'iyoung0':-1,
              'ryan0':-1,
              'europa0':-1,
              'ryan0':-1,
              'europa0':-1,
              'ayla0':-1,
              'bastet1':-1,
            };
            let summaryHex = null;
            let totalIcons = 0;
            function buildHoneycomb() {
                const container = document.getElementById("iconContainer");
                container.innerHTML = "";
                const isMobile = window.innerWidth <= 600;
                const hexWidth = isMobile ? 96 : 128;
                const gap = 10;
                const gap_right = 12.5;
                const containerWidth = container.clientWidth;
                const oddCount = Math.max(
                    1,
                    Math.floor(containerWidth / (hexWidth + gap))
                );
                const evenCount = Math.max(
                    1,
                    oddCount - 1
                );
                const keys = Object.keys(imgs);
                totalIcons = keys.length;
                let activeIcons = 0;
                let index = 0;
                let rowNumber = 0;
                while (index < keys.length) {
                    const row = document.createElement("div");
                    row.className =
                        "row " +
                        (rowNumber % 2 ? "even" : "odd");
                    const count =
                        rowNumber % 2
                            ? evenCount
                            : oddCount;
                    for (
                        let i = 0;
                        i < count && index < keys.length;
                        i++, index++
                    ) {
                        const hex =
                            document.createElement("div");
                        hex.className = "hex";
                        hex.style.marginRight = gap_right + "px";
                        hex.style.width = hexWidth + "px";
                        hex.style.height =
                            Math.round(hexWidth * 1.15) + "px";
                        const img =
                            document.createElement("img");
                        img.src = imgs[keys[index]];
                        img.className = "icon";
                        img.dataset.count = "-1";
                        const counter = document.createElement("div");
                        counter.className = "counter";
                        counter.style.display = "none";
                        counter.textContent = "";
                        img.addEventListener("click", function () {
                            let count = parseInt(this.dataset.count);
                            if (count === -1) {
                                count = 0;
                                this.dataset.count = count;
                                counter.style.display = "block";
                                counter.textContent = count;
                                this.classList.add("active");
                                activeIcons = document.querySelectorAll(".icon.active").length
                                summaryHex?.update(activeIcons, totalIcons);
                                return;
                            }
                            count++;
                            if (count >= 11) {
                                this.dataset.count = "-1";
                                counter.textContent = "";
                                counter.style.display = "none";
                                this.classList.remove("active");
                            } else if (count == 10) {
                                this.dataset.count = 10;
                                counter.textContent = "X";
                                this.classList.add("active");
                            } else {
                                this.dataset.count = count;
                                counter.textContent = count;
                                this.classList.add("active");
                            }
                            activeIcons = document.querySelectorAll(".icon.active").length
                            summaryHex?.update(activeIcons, totalIcons);
                        });
                        hex.appendChild(img);
                        row.appendChild(hex);
                        hex.appendChild(counter);
                    }
                    container.appendChild(row);
                    rowNumber++;
                }
                function createSummaryHex(active, total) {
                    const hex = document.createElement("div");
                    hex.className = "hex summary";

                    hex.style.width = hexWidth + "px";
                    hex.style.height = Math.round(hexWidth * 1.15) + "px";
                    hex.style.marginRight = gap_right + "px";

                    hex.style.display = "flex";
                    hex.style.alignItems = "center";
                    hex.style.justifyContent = "center";
                    hex.style.textAlign = "center";
                    hex.style.padding = "10px";
                    hex.style.boxSizing = "border-box";
                    hex.style.opacity = "1";

                    hex.dataset.active = active;
                    hex.dataset.total = total;

                    hex.update = function (a, t) {
                        const percent = t === 0 ? 0 : Math.round((a / t) * 100);
                        hex.innerHTML = `
                            <div style="font-size:24px; line-height:1.3;">
                                <div><b>${a}</b> / ${t}</div>
                                <div>${percent}%</div>
                            </div>
                        `;
                    };
                    hex.update(active, total);
                    return hex;
                }
                activeIcons = activeIcons = document.querySelectorAll(".icon.active").length;
                summaryHex = createSummaryHex(activeIcons, totalIcons);
                // Put it into a new row OR append to last row
                let lastRow = container.lastElementChild;
                // Check if it fits in last row
                if (lastRow && lastRow.children.length < oddCount) {
                    lastRow.appendChild(summaryHex);
                } else {
                    const row = document.createElement("div");
                    row.className = "row odd";
                    row.appendChild(summaryHex);
                    container.appendChild(row);
                }
                function createCaptureHex() {
                    const hex = document.createElement("div");
                    hex.className = "hex capture-hex";
                    hex.style.width = hexWidth + "px";
                    hex.style.height = Math.round(hexWidth * 1.15) + "px";
                    hex.style.marginRight = gap_right + "px";
                    hex.style.display = "flex";
                    hex.style.alignItems = "center";
                    hex.style.justifyContent = "center";
                    hex.style.background = "#222";
                    hex.style.cursor = "pointer";
                    hex.style.opacity = "1";
                    hex.style.userSelect = "none";
                    hex.innerHTML = `
                        <div style="font-size:12px; text-align:center;">
                            📸<br>Capture
                        </div>
                    `;
                    hex.addEventListener("click", async () => {
                        const container = document.getElementById("iconContainer");
                        const captureBtn = hex;

                        try {
                            // hide capture button
                            captureBtn.style.display = "none";

                            const dataUrl = await domtoimage.toPng(container);

                            const link = document.createElement("a");
                            link.download = "honeycomb.png";
                            link.href = dataUrl;
                            link.click();

                        } catch (err) {
                            console.error("Capture failed:", err);

                        } finally {
                            // always restore button even if error happens
                            captureBtn.style.display = "flex";
                        }
                    });
                    return hex;
                }
                const captureHex = createCaptureHex();

                lastRow = container.lastElementChild;

                if (lastRow && lastRow.children.length < oddCount) {
                    lastRow.appendChild(captureHex);
                } else {
                    const row = document.createElement("div");
                    row.className = "row odd";
                    row.appendChild(captureHex);
                    container.appendChild(row);
                }
            }
            window.addEventListener(
                "load",
                buildHoneycomb
            );
            window.addEventListener(
                "resize",
                buildHoneycomb
            );

        </script>
