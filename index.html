<!DOCTYPE html>
<html>
    <head>
        <title>Grand Chase Unit Chart</title>
        <meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg">
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
		<script src="static/js/dom-to-image.js"></script>
    </head>
    <style>
    body {
        background: #111;
        color: white;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
    }
    #iconContainer {
        display: flex;
        flex-wrap: wrap;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        gap: 8px;
        width: 100%;
        max-width: 100vw;
        box-sizing: border-box;
        padding: 10px;
    }
    .hex {
        width: 100%;
        height: 100%;
        position: relative;
        background: #333;
        overflow: hidden;

        clip-path: polygon(
            50% 0%,
            100% 25%,
            100% 75%,
            50% 100%,
            0% 75%,
            0% 25%
        );
    }
    .hex.summary {
        pointer-events: none;
        background: white;
        opacity: 1;
        font-size: 32px;
        font-weight: bolder;
        color: black;
    }
    .counter {
        position: absolute;
        top: 15%;
        right: 20%;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-left: 6px;
        margin: 0;
        font-size: 16px;
        font-weight: bolder;
        line-height: 1.5;
        color: black;
        background: white;
        border: 1px solid rgba(255, 255, 255, 0.25);
        text-shadow: none;
        pointer-events: none;
        box-sizing: border-box;
    /* fixes optical digit shift */
    text-indent: 0;
    letter-spacing: 0;
    }
    .row {
        display: flex;
    }

    .row + .row {
        margin-top: -28px;
    }

    .row.even {
        margin-left: 68px;
    }
    .icon {
        width: 100%;
        height: 100%;
        object-fit: cover;

        clip-path: polygon(
            50% 0%,
            100% 25%,
            100% 75%,
            50% 100%,
            0% 75%,
            0% 25%
        );
        opacity: 0.2;
        -webkit-user-drag: none;
        user-select: none;
    }
    .icon.active {
        opacity: 1;
    }
    </style>
    <body>
        <div id="iconContainer"></div>
        <script src="icons.js"></script>
        <script>
            let summaryHex = null;
            let totalIcons = 0;
            function generateSaveCode() {
                const icons = document.querySelectorAll(".icon");
                const changes = [];
                icons.forEach((icon, index) => {
                    const count = parseInt(icon.dataset.count);
                    if (count === -2) return;
                    changes.push(`${index}:${count}`);
                });
                return btoa(changes.join(","));
            }
            function loadSaveCode(code) {
                try {
                    const decoded = atob(code);
                        const changes = decoded
                            .split(",")
                            .filter(Boolean)
                            .map(pair => {
                                const [index, value] = pair.split(":");
                                return [parseInt(index), parseInt(value)];
                            });
                        const icons = document.querySelectorAll(".icon");
                        icons.forEach(icon => {
                            icon.dataset.count = -2;
                            icon.classList.remove("active");
                            updateIconImage(icon);
                            const counter =
                                icon.parentElement.querySelector(".counter");
                            counter.style.display = "none";
                            counter.textContent = "";
                        });
                        changes.forEach(([index, value]) => {
                            const icon = icons[index];
                            if (!icon) return;
                            icon.dataset.count = value;
                            const counter =
                                icon.parentElement.querySelector(".counter");
                            if (value >= 0) {
                                counter.style.display = "block";
                                counter.textContent = value === 10 ? "X" : value;
                                icon.classList.add("active");
                            } else {
                                icon.classList.toggle("active", value === -1);
                                counter.style.display = "none";
                            }
                            updateIconImage(icon);
                        });
                        const activeIcons =
                            document.querySelectorAll(".icon.active").length;
                        summaryHex?.update(activeIcons, totalIcons);
                    } catch (err) {
                        console.error("Invalid save code", err);
                }
            }
            function updateIconImage(img) {
                const count = parseInt(img.dataset.count);
                const base = img.dataset.base;
                img.src = count >= 0
                    ? imgs[`${base}-1`]
                    : imgs[`${base}-0`];
            }
            function buildHoneycomb() {
                const container = document.getElementById("iconContainer");
                container.innerHTML = "";
                const hexWidth = 128;
                const gap = 10;
                const gap_right = 10;
                const MIN_PER_ROW = 12;
                const oddCount = MIN_PER_ROW;
                const evenCount = MIN_PER_ROW;
                const keys = Object.keys(imgs).filter(k => k.endsWith("-0"));
                totalIcons = keys.length;
                let activeIcons = 0;
                let index = 0;
                let rowNumber = 0;
                while (index < keys.length) {
                    const row = document.createElement("div");
                    row.className =
                        "row " +
                        (rowNumber % 2 ? "even" : "odd");
                    const count =
                        rowNumber % 2
                            ? evenCount
                            : oddCount;
                    for (
                        let i = 0;
                        i < count && index < keys.length;
                        i++, index++
                    ) {
                        const hex =
                            document.createElement("div");
                        hex.className = "hex";
                        hex.style.marginRight = gap_right + "px";
                        hex.style.width = hexWidth + "px";
                        hex.style.height =
                            Math.round(hexWidth * 1.15) + "px";
                        const img =
                            document.createElement("img");
                        img.src = imgs[keys[index]];
                        img.className = "icon";
                        img.draggable = false;
                        img.dataset.count = -2;
                        const base = keys[index].replace(/-0$/, "");
                        img.dataset.base = base;
                        img.dataset.des = imgs[`${base}-1`] ? "true" : "false";
                        const counter = document.createElement("div");
                        counter.className = "counter";
                        counter.style.display = "none";
                        counter.textContent = "";
                        img.addEventListener("dragstart", (e) => {
                            e.preventDefault();
                        });
                        img.addEventListener("click", function () {
                            let count = parseInt(this.dataset.count);
                            if (count === -2) {
                                count = -1;
                                this.dataset.count = count;
                                updateIconImage(this);
                                this.classList.add("active");
                                activeIcons = document.querySelectorAll(".icon.active").length
                                summaryHex?.update(activeIcons, totalIcons);
                                saveToLocal()
                                return;
                            } else if (count == -1){
                                if(img.dataset.des == "false"){
                                    count = -2;
                                    this.dataset.count = count;
                                    this.classList.remove("active");
                                    activeIcons = document.querySelectorAll(".icon.active").length
                                    summaryHex?.update(activeIcons, totalIcons);
                                } else {
                                    count = 0;
                                    this.dataset.count = count;
                                    counter.style.display = "block";
                                    updateIconImage(this);
                                    counter.textContent = count;
                                }
                                saveToLocal()
                                return;
                            }
                            count++;
                            if (count >= 11) {
                                this.dataset.count = -2;
                                counter.textContent = "";
                                updateIconImage(this);
                                counter.style.display = "none";
                                this.classList.remove("active");
                            } else if (count == 10) {
                                this.dataset.count = 10;
                                counter.textContent = "X";
                                this.classList.add("active");
                            } else if (count == -1){
                                this.dataset.count = -1;
                                this.classList.remove("active");
                            }
                            else {
                                this.dataset.count = count;
                                counter.textContent = count;
                                this.classList.add("active");
                            }
                            activeIcons = document.querySelectorAll(".icon.active").length
                            summaryHex?.update(activeIcons, totalIcons);
                            saveToLocal()
                        });
                        hex.appendChild(img);
                        row.appendChild(hex);
                        hex.appendChild(counter);
                    }
                    container.appendChild(row);
                    rowNumber++;
                }
                function createSummaryHex(active, total) {
                    const hex = document.createElement("div");
                    hex.className = "hex summary";
                    hex.style.width = hexWidth + "px";
                    hex.style.height = Math.round(hexWidth * 1.15) + "px";
                    hex.style.marginRight = gap_right + "px";
                    hex.style.display = "flex";
                    hex.style.alignItems = "center";
                    hex.style.justifyContent = "center";
                    hex.style.textAlign = "center";
                    hex.style.padding = "10px";
                    hex.style.boxSizing = "border-box";
                    hex.style.opacity = "1";
                    hex.dataset.active = active;
                    hex.dataset.total = total;
                    hex.update = function (a, t) {
                        const percent = t === 0 ? 0 : Math.round((a / t) * 100);
                        hex.innerHTML = `
                            <div style="font-size:24px; line-height:1.3;">
                                <div><b>${a}</b> / ${t}</div>
                                <div>${percent}%</div>
                            </div>
                        `;
                    };
                    hex.update(active, total);
                    return hex;
                }
                activeIcons = activeIcons = document.querySelectorAll(".icon.active").length;
                summaryHex = createSummaryHex(activeIcons, totalIcons);
                // Put it into a new row OR append to last row
                let lastRow = container.lastElementChild;
                // Check if it fits in last row
                if (lastRow && lastRow.children.length < oddCount) {
                    lastRow.appendChild(summaryHex);
                } else {
                    const row = document.createElement("div");
                    row.className = "row odd";
                    row.appendChild(summaryHex);
                    container.appendChild(row);
                }
                function createCaptureHex() {
                    const hex = document.createElement("div");
                    hex.className = "hex capture-hex";
                    hex.classList.add("control-hex");
                    hex.style.width = hexWidth + "px";
                    hex.style.height = Math.round(hexWidth * 1.15) + "px";
                    hex.style.marginRight = gap_right + "px";
                    hex.style.display = "flex";
                    hex.style.alignItems = "center";
                    hex.style.justifyContent = "center";
                    hex.style.background = "#222";
                    hex.style.cursor = "pointer";
                    hex.style.opacity = "1";
                    hex.style.userSelect = "none";
                    hex.innerHTML = `
                        <div style="font-size:12px; text-align:center;">
                            📸<br>Capture
                        </div>
                    `;
                    hex.addEventListener("click", async () => {
                        const container = document.getElementById("iconContainer");
                        const controls = document.querySelectorAll(".control-hex");
                        try {
                            // hide capture button
                            console.log(controls)
                            controls.forEach(el => el.style.visibility = "hidden");
                            const dataUrl = await domtoimage.toPng(container);
                            const link = document.createElement("a");
                            link.download = "grand_chase_flex_chart.png";
                            link.href = dataUrl;
                            link.click();
                        } catch (err) {
                            console.error("Capture failed:", err);

                        } finally {
                            controls.forEach(el => el.style.visibility = "visible");
                        }
                    });
                    return hex;
                }
                function createSaveHex() {
                    const hex = document.createElement("div");
                    hex.className = "hex save-hex";
                    hex.classList.add("control-hex");
                    hex.style.width = hexWidth + "px";
                    hex.style.height = Math.round(hexWidth * 1.15) + "px";
                    hex.style.marginRight = gap_right + "px";
                    hex.style.display = "flex";
                    hex.style.alignItems = "center";
                    hex.style.justifyContent = "center";
                    hex.style.background = "#222";
                    hex.style.cursor = "pointer";
                    hex.style.userSelect = "none";
                    hex.innerHTML = `
                        <div style="font-size:12px; text-align:center;">
                            💾<br>Save
                        </div>
                    `;
                    hex.addEventListener("click", async () => {
                        try {
                            const saveCode = generateSaveCode();
                            await navigator.clipboard.writeText(saveCode);
                            alert("Save code copied to clipboard!");
                        } catch (err) {
                            console.error(err);
                            alert("Failed to copy save code.");
                        }
                    });
                    return hex;
                }
                function createLoadHex() {
                    const hex = document.createElement("div");
                    hex.className = "hex load-hex";
                    hex.classList.add("control-hex");
                    hex.style.width = hexWidth + "px";
                    hex.style.height = Math.round(hexWidth * 1.15) + "px";
                    hex.style.marginRight = gap_right + "px";
                    hex.style.display = "flex";
                    hex.style.alignItems = "center";
                    hex.style.justifyContent = "center";
                    hex.style.background = "#222";
                    hex.style.cursor = "pointer";
                    hex.style.userSelect = "none";
                    hex.innerHTML = `
                        <div style="font-size:12px; text-align:center;">
                            📂<br>Load
                        </div>
                    `;
                    hex.addEventListener("click", () => {
                        const code = prompt("Paste save code:");
                        if (!code) return;
                        loadSaveCode(code);
                    });
                    return hex;
                }
                function createClearHex() {
                    const hex = document.createElement("div");
                    hex.className = "hex clear-hex";
                    hex.classList.add("control-hex");
                    hex.style.width = hexWidth + "px";
                    hex.style.height = Math.round(hexWidth * 1.15) + "px";
                    hex.style.marginRight = gap_right + "px";
                    hex.style.display = "flex";
                    hex.style.alignItems = "center";
                    hex.style.justifyContent = "center";
                    hex.style.background = "#222";
                    hex.style.cursor = "pointer";
                    hex.style.userSelect = "none";
                    hex.innerHTML = `
                        <div style="font-size:12px; text-align:center;">
                            🧹<br>Clear
                        </div>
                    `;
                    hex.addEventListener("click", () => {
                        const icons = document.querySelectorAll(".icon");
                        icons.forEach(icon => {
                            icon.dataset.count = -2;
                            icon.classList.remove("active");
                            updateIconImage(icon);
                            const counter =
                                icon.parentElement.querySelector(".counter");

                            counter.style.display = "none";
                            counter.textContent = "";
                        });
                        summaryHex?.update(0, totalIcons);
                        localStorage.removeItem("iconSave");
                        saveToLocal();
                    });
                    return hex;
                }
                const saveHex = createSaveHex();
                const loadHex = createLoadHex();
                const captureHex = createCaptureHex();
                const clearHex = createClearHex();
                [saveHex, loadHex, clearHex, captureHex].forEach(hex => {
                    let lastRow = container.lastElementChild;
                    if (lastRow && lastRow.children.length < oddCount) {
                        lastRow.appendChild(hex);
                    } else {
                        const row = document.createElement("div");
                        row.className = "row odd";
                        row.appendChild(hex);
                        container.appendChild(row);
                    }
                    });
            }
            function saveToLocal() {
                const saveCode = generateSaveCode();
                localStorage.setItem("iconSave", saveCode);
                updateURLSave(saveCode);
            }
            function loadFromLocal() {
                const code = localStorage.getItem("iconSave");
                if (!code) return;
                loadSaveCode(code);
            }
            function getSaveFromURL() {
                const params = new URLSearchParams(window.location.search);
                return params.get("save");
            }
            function updateURLSave(code) {
                const url = new URL(window.location);
                url.searchParams.set("save", code);
                window.history.replaceState({}, "", url);
            }
            window.addEventListener("load", () => {
                buildHoneycomb();
                const urlSave = getSaveFromURL();
                if (urlSave) {
                    loadSaveCode(urlSave);
                } else {
                    loadFromLocal();
                }
            });
        </script>
    </body>
</html>
